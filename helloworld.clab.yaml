name: helloworld

topology:
  nodes:
    client1:
      kind: linux
      image: alpine
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
    client2:
      kind: linux
      image: alpine
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
  links:
    - endpoints: [host1:client1, client2:eth1]
